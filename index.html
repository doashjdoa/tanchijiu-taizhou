<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃鸠 · 台州美食账簿</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header id="top-banner" class="hidden">
            <div class="banner-inner">
                <span class="banner-icon">📖</span>
                <span id="page-title-text">贪吃鸠 · 台州美食账簿</span>
            </div>
        </header>

        <main id="main-content"></main>

        <div id="float-shout" class="hidden">
            <button id="shout-btn">吼一声！</button>
        </div>
    </div>

    <div id="shout-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h3>没找到想吃的？吼一声！</h3>
            <p>告诉贪吃鸠，你想吃啥？几个人？我来指路。</p>
            <form id="shout-form">
                <input type="text" name="food" placeholder="想吃啥？" required>
                <input type="text" name="people" placeholder="几个人？">
                <button type="submit">提交，等指路</button>
            </form>
            <div class="modal-divider">或</div>
            <p class="wechat-hint">加我微信：<strong>tanchijiu_tz</strong>，私聊指路</p>
            <button class="modal-close-btn">算了，咕咕</button>
        </div>
    </div>

    <div id="random-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content random-modal-content">
            <div class="slot-machine">
                <div class="slot-reel" id="slot-reel"></div>
                <div class="slot-window"></div>
                <div class="slot-handle" id="slot-handle">↓</div>
            </div>
            <div class="random-result hidden" id="random-result">
                <div class="result-badge" id="result-badge"></div>
                <h3 id="result-name"></h3>
                <p class="result-roar" id="result-roar"></p>
                <div class="result-actions">
                    <button class="btn-confirm" id="btn-confirm-random">走！去吃</button>
                    <button class="btn-reroll" id="btn-reroll-random">再咕一次</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
